version: "3"

services:
  urlshortenerapi:
    container_name: urlshortenerapi
    build: .
    restart: always
    env_file: .env
    ports:
      - "10001:8080"
    networks:
      - backend

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - backend

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - backend

networks:
  backend:
    driver: bridge